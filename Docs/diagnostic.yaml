  - event: "Templates verified inactive"
    log_lines:
      - "[CreaturePrefabCreator] Verified ZNetScene lookup for generated prefab Bjorn_cub."
      - "[CreaturePrefabCreator]   activeSelf=False, activeInHierarchy=False"
    status: "expected_behavior"

  - event: "ZDO not used spam"
    first_occurrence: "00:36:52"
    frequency: "Every frame (~100+ times/sec)"
    message_pattern: "ZDO 1:174934 not used when creating object Bjorn_cub"
    root_cause_analysis: |
      ZNetScene is trying to instantiate a Bjorn_cub for an existing ZDO (ID 1:174934) from the world save.
      The instantiated object does not properly consume/attach the ZDO, causing the warning to repeat.
      This likely happens because:
      1. The template is an inactive GameObject in the scene root with a ZNetView
      2. When ZNetScene clones the prefab for the ZDO, the ZNetView on the clone fails to initialize properly
      3. The clone might be missing components or have corrupted references because the template was modified
      4. The ZDO persists and ZNetScene retries every frame

