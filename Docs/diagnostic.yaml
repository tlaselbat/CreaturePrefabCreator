root_causes:
  - id: "RC-ZDO-SPAM"
    severity: "critical"
    title: "Inactive template causes ZDO sync failure on world load"
    description: |
      The Bjorn_cub template is an inactive GameObject in the scene root.
      It has a ZNetView component (cloned from Bjorn source).
      ZNetScene discovers it via m_prefabs / m_namedPrefabs.
      When loading a world with a saved Bjorn_cub ZDO (ID 1:174934),
      ZNetScene instantiates from the template but the resulting object's
      ZNetView doesn't properly consume the ZDO, causing endless retry warnings.
    possible_reasons:
      - "Inactive template's ZNetView has no valid ZDO data when cloned"
      - "Template's ZNetView.m_zdo is null or uninitialized"
      - "Clone inherits template's ZNetView state but ZNetScene expects to bind a new ZDO"
      - "The template itself might be getting instantiated instead of a proper copy"
    impact:
      - "Log spam (~100 warnings/sec)"
      - "Performance degradation"
      - "Bjorn_cub entities from save may not load correctly"
      - "Potential save corruption or entity loss"

fixes_required:
  - id: "FIX-ZDO-SPAM"
    priority: "critical"
    file: "GeneratedPrefabs/GeneratedPrefabManager.cs"
    action: |
      Ensure the template is a proper prefab asset, not a live inactive scene object.
      Options:
      1. Use PrefabUtility to create a true prefab asset (only works in Editor)
      2. Create the template under a DontDestroyOnLoad inactive container
      3. Remove ZNetView from the template and let ZNetScene add it when spawning
      4. Use Jotunn's CustomPrefab without keeping the live GameObject in scene
      5. Mark the template with hideFlags = HideFlags.HideAndDontSave
    recommended_approach: |
      Option 2 + 5: Create a persistent inactive container under DontDestroyOnLoad,
      parent all templates under it, and set hideFlags to prevent scene pollution.
      This keeps templates alive but hidden from ZNetScene's object discovery.

  - id: "FIX-ZNETVIEW-TEMPLATE"
    priority: "high"
    file: "GeneratedPrefabs/GeneratedPrefabManager.cs"
    action: |
      Consider removing ZNetView from the template after registration,
      OR ensure the ZNetView is in a clean state (m_zdo = null, m_viewID = 0)
      so clones get a fresh ZNetView.
    note: |
      In Valheim, prefab templates in the game files DO have ZNetView components,
      but they are in asset bundles, not live scene objects.
      Our live-scene-template approach may be fundamentally incompatible with
      how ZNetScene expects prefabs to work.

notes:
  - "MountUp guard patches ARE working with delayed retry."
  - "AllTameable 'could not find prefab' warning is cosmetic at startup; resolves after ZNetScene loads."
  - "The ZDO spam is the most critical remaining issue."
  - "Previous fixes (no DestroyImmediate, no activeSelf force, delayed MountUp retry) are correct."
  - "The fundamental architecture of using a live inactive GameObject as a prefab template may need revision."
